<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>项目管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:80px 20px}
.container{width:100%;max-width:1200px}
.hidden{display:none!important}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.header h1{font-size:22px;font-weight:600}
.btn-back{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;background:#fff;border:1px solid #dcdfe6;border-radius:6px;font-size:13px;cursor:pointer;color:#606266;transition:all .2s}
.btn-back:hover{color:#409eff;border-color:#c6e2ff;background:#ecf5ff}
.btn-back svg{width:14px;height:14px;fill:currentColor}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#409eff;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:background .2s}
.btn-add:hover{background:#337ecc}
.btn-add svg{width:16px;height:16px;fill:currentColor}
.list{display:flex;flex-direction:column;gap:8px}
.project-card{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:all .2s;position:relative}
.project-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.12);border-left:3px solid #409eff;padding-left:13px}
.project-info{display:flex;flex-direction:column;gap:2px;overflow:hidden;flex:1}
.project-name{font-size:14px;font-weight:500}
.project-path{font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-arrow{flex-shrink:0;color:#ccc;font-size:14px;margin-left:8px}
.btn-del-project{flex-shrink:0;width:28px;height:28px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:#ccc;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-del-project:hover{background:#fef0f0;color:#f56c6c}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.detail-header h2{font-size:20px;font-weight:600}
.detail-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid #e4e7ed}
.detail-tab{padding:10px 22px;font-size:14px;cursor:pointer;color:#909399;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.detail-tab:hover{color:#606266}
.detail-tab.active{color:#409eff;border-bottom-color:#409eff;font-weight:500}
.upload-section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-label{font-size:13px;font-weight:500;color:#606266}
.upload-btn-doc{display:flex;align-items:center;gap:8px;width:100%;padding:16px 20px;background:#fff;border:1px dashed #dcdfe6;border-radius:8px;font-size:15px;cursor:pointer;color:#606266;transition:all .2s}
.upload-btn-doc:hover{border-color:#409eff;color:#409eff;background:#ecf5ff}
.upload-btn-doc svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.upload-btn-code{display:flex;align-items:center;gap:6px;width:100%;padding:10px 16px;background:#fff;border:1px dashed #dcdfe6;border-radius:6px;font-size:13px;cursor:pointer;color:#606266;transition:all .2s}
.upload-btn-code:hover{border-color:#409eff;color:#409eff;background:#ecf5ff}
.upload-btn-code svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.upload-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.upload-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;font-size:13px}
.upload-item.invalid{background:#fef0f0;border-color:#f56c6c}
.upload-item.valid{background:#f0f9eb;border-color:#67c23a}
.upload-item-left{display:flex;align-items:center;gap:8px;overflow:hidden}
.upload-item-status{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#f59e0b}
.upload-item-status.error{background:#f56c6c}
.upload-item-status.ok{background:#67c23a}
.upload-item-name{color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-item-extra{font-size:11px;color:#909399;margin-left:6px;flex-shrink:0}
.upload-item-msg{padding:4px 14px 10px;font-size:11px;color:#f56c6c;border-top:1px solid #fde2e2;white-space:pre-wrap;line-height:1.5}
.upload-item-remove{flex-shrink:0;width:24px;height:24px;border:none;background:transparent;border-radius:4px;cursor:pointer;color:#ccc;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.upload-item-remove:hover{background:#fef0f0;color:#f56c6c}
.upload-footer{display:flex;justify-content:flex-end;margin-top:10px;min-height:36px;gap:8px}
.btn-interpret,.btn-confirm{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;transition:background .2s}
.btn-interpret{background:#409eff}
.btn-interpret:hover{background:#337ecc}
.btn-confirm{background:#10b981}
.btn-confirm:hover{background:#059669}
.btn-confirm:disabled{background:#c0c4cc;cursor:not-allowed}
.btn-interpret svg,.btn-confirm svg{width:14px;height:14px;fill:currentColor}
.code-row{display:block}
.code-left{flex:1;min-width:0}
/* .code-right removed */
.sf-panel,.interpret-panel{background:#fff;border:1px solid #e4e7ed;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.interpret-panel{min-height:200px}
.interpret-header{padding:12px 16px;font-size:14px;font-weight:500;color:#333;border-bottom:1px solid #f0f0f0;background:#fafafa}
.interpret-body{flex:1;padding:24px 16px;display:flex;flex-direction:column;gap:12px}
.interpret-files{display:flex;flex-direction:column;gap:6px}
.interpret-file-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f9fafb;border-radius:6px;font-size:13px;color:#606266}
.interpret-file-item svg{width:14px;height:14px;fill:#409eff;flex-shrink:0}
.interpret-content{flex:1;min-height:80px;border:1px dashed #e4e7ed;border-radius:6px;padding:12px;font-size:13px;overflow-y:auto;max-height:400px}
.interp-ref{font-size:12px;color:#909399;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.ip-result{background:#f9fafb;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.ip-result .ip-name{font-weight:500;color:#333;min-width:60px;font-size:13px}
.ip-result .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-on{background:#f0f9eb;color:#67c23a!important}
.tag-off{background:#fef0f0;color:#f56c6c!important}
.tag-unk{background:#fdf6ec;color:#e6a23c!important}
.tag-crc{background:#ecf5ff;color:#409eff!important;font-family:monospace!important}
.tag-detail{font-size:10px;color:#999!important;margin-left:2px}

.interpret-footer{display:flex;justify-content:flex-end;padding:12px 16px;border-top:1px solid #f0f0f0;gap:8px}
.sf-panel-section{display:flex;flex-direction:column}
.sf-panel-section+.sf-panel-section{border-top:1px solid #e4e7ed}
.sf-panel-header{padding:8px 12px;font-size:12px;font-weight:500;color:#606266;background:#fafafa;flex-shrink:0}
.sf-panel-body{overflow-y:auto;padding:4px 0;max-height:180px}
.sf-panel-body::-webkit-scrollbar{width:4px}
.sf-panel-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.sf-file{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 8px;font-size:12px;color:#333;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.sf-file:hover{background:#f5f7fa}
.sf-file.selected{background:#ecf5ff;border-left-color:#409eff}
.sf-file svg.doc-icon{width:12px;height:12px;fill:#409eff;flex-shrink:0}
.sf-file svg.code-icon{width:12px;height:12px;fill:#e6a23c;flex-shrink:0}
.sf-file-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.sf-file-sub{font-size:10px;color:#909399;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline;margin-left:4px}.sf-check{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid #dcdfe6;font-size:8px;color:#fff;transition:all .15s}
.sf-check.selected{background:#409eff;border-color:#409eff}
.sf-check svg{width:8px;height:8px;fill:#fff}
.sf-empty{padding:30px 12px;text-align:center;color:#bbb;font-size:12px}
.sf-selected-bar{padding:4px 12px 6px;font-size:11px;color:#909399;border-top:1px solid #f0f0f0;min-height:24px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.sf-selected-bar .tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px}
.sf-selected-bar .tag.doc{background:#ecf5ff;color:#409eff}
.sf-selected-bar .tag.base{background:#fdf6ec;color:#e6a23c}
.table-controls{display:flex;justify-content:flex-end;margin-bottom:12px}
.btn-refresh{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#fff;border:1px solid #dcdfe6;border-radius:6px;font-size:13px;cursor:pointer;color:#606266;transition:all .2s}
.btn-refresh:hover{color:#409eff;border-color:#c6e2ff;background:#ecf5ff}
.btn-refresh svg{width:14px;height:14px;fill:currentColor}
.version-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.version-table th{padding:12px 16px;font-size:13px;font-weight:500;color:#909399;text-align:left;background:#fafafa;border-bottom:1px solid #ebeef5}
.version-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f0f0f0}
.version-table tr:last-child td{border-bottom:none}
.version-table tr:hover td{background:#f5f7fa}
.cell-name{color:#f56c6c;font-weight:500}
.cell-time{color:#67c23a}
.cell-doc{color:#409eff}
.cell-base{color:#e6a23c}.version-sub{font-size:10px;color:#909399;display:block;margin-top:2px}
.cell-size{color:#909399}
.cell-action{width:80px;text-align:center}.btn-act{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border:none;border-radius:4px;font-size:11px;cursor:pointer;transition:all .2s;margin:0 2px}.btn-act svg{width:11px;height:11px;fill:currentColor}.btn-edit{background:#ecf5ff;color:#409eff}.btn-edit:hover{background:#409eff;color:#fff}.btn-del{background:#fef0f0;color:#f56c6c}.btn-del:hover{background:#f56c6c;color:#fff}.btn-del-version{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border:none;background:#fef0f0;color:#f56c6c;border-radius:4px;font-size:12px;cursor:pointer;transition:all .2s}.btn-del-version:hover{background:#f56c6c;color:#fff}.btn-detail{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border:none;border-radius:4px;font-size:11px;cursor:pointer;background:#ecf5ff;color:#409eff;transition:all .2s;margin:0 2px}.btn-detail:hover{background:#409eff;color:#fff}.hd{color:#f56c6c!important;font-weight:700;background:#fef0f0;padding:0 1px;border-radius:2px}.empty{text-align:center;padding:60px 0;color:#bbb;font-size:14px}
.empty-docs{text-align:center;padding:20px 0;color:#bbb;font-size:13px}
.hex-table{border-collapse:collapse;font-family:Consolas,monospace;font-size:11px;width:100%;min-width:700px}
.hex-table th{position:sticky;top:0;background:#f5f7fa;z-index:1;padding:3px 1px;border:1px solid #e4e7ed;font-weight:500;text-align:center;font-size:10px;color:#606266}
.hex-table td{padding:2px 1px;border:1px solid #e4e7ed;text-align:center;white-space:nowrap;font-size:11px}
.hex-table .col-offset{color:#909399;text-align:center;padding:2px 6px;background:#fafafa;font-weight:500;font-size:10px}
.hex-table .col-block-header{background:#f0f5ff;color:#409eff;font-weight:500;font-size:11px}
.hex-table .col-block-header-base{background:#fef7e8;color:#e6a23c;font-weight:500;font-size:11px}
.hex-table .col-offset-header{background:#fafafa;color:#909399}
.hex-table .cell-switch{background:#e8f5e9}
.hex-table .cell-param{background:#e3f2fd}
.hex-table .cell-diff{color:#f56c6c;font-weight:700}
.hex-table tbody tr:hover td{background:#f5f7fa}
.hex-table tbody tr:hover .cell-switch{background:#d4edda}
.hex-table tbody tr:hover .cell-param{background:#d0dcf5}
.diff-summary{display:flex;gap:16px;padding:6px 12px;background:#fff;border:1px solid #e4e7ed;border-radius:0 0 8px 8px;font-size:11px;flex-wrap:wrap;border-top:none;margin-top:-1px}
.diff-summary .total{color:#909399}
.diff-summary .diff-count{color:#f56c6c;font-weight:500}
.diff-summary .same-count{color:#67c23a;font-weight:500}
/* combined ip table */
.ip-table{width:100%;border-collapse:collapse;min-width:750px}
.ip-table th{padding:5px 5px;font-size:11px;font-weight:500;color:#909399;text-align:left;background:#f5f7fa;border-bottom:1px solid #ebeef5;white-space:nowrap}
.ip-table td{padding:4px 5px;font-size:12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap}
.ip-table tbody tr:hover td{background:#f5f7fa}
th.section-header{display:table-cell;padding:5px 5px;font-size:12px;font-weight:600;text-align:center}
.section-cur{background:#ecf5ff!important;color:#409eff}
.section-base{background:#fef7e8!important;color:#e6a23c}
.col-divider{width:4px!important;padding:0!important;background:#f0f0f0;border-left:1px solid #e4e7ed!important;border-right:1px solid #e4e7ed!important}
.ip-name{color:#333;font-weight:600;font-size:12px}
.ip-name-diff{color:#f56c6c;font-weight:600;font-size:12px}
.status-badge{display:inline-block;padding:1px 8px;border-radius:8px;font-size:11px;font-weight:600;text-align:center;min-width:30px}
.status-on{background:#f0f9eb;color:#67c23a}
.status-off{background:#fef0f0;color:#f56c6c}
.status-unk{background:#fdf6ec;color:#e6a23c}
.status-diff{background:#fce4ec;color:#c62828}
.status-na{background:#f5f5f5;color:#bbb}
.param-addr{font-family:Consolas,monospace;color:#409eff;font-size:11px}
.param-addr-na{color:#bbb;font-family:Consolas,monospace;font-size:11px}
.crc-val{font-family:Consolas,monospace;color:#e6a23c;font-size:12px;font-weight:600}
.crc-diff{color:#f56c6c}
.crc-na{color:#bbb;font-weight:400}
.switch-cell{display:flex;flex-direction:column;gap:0}
.switch-row{display:flex;gap:3px;font-size:11px;align-items:center}
.switch-row .label{color:#909399;font-size:10px;min-width:14px}
.switch-row .vals{font-family:Consolas,monospace;color:#333}
.switch-row .on-vals{color:#67c23a;font-weight:600}
.switch-row .off-vals{color:#f56c6c;font-weight:600}
.switch-na{color:#bbb;font-size:11px;font-family:Consolas,monospace;padding-left:18px}
.read-val{font-family:Consolas,monospace;color:#409eff;font-size:12px;font-weight:600}
.read-val-diff{color:#f56c6c}
.read-na{color:#bbb;font-weight:400}
tr.diff-row td{background:#fefaf0}
tr.diff-row:hover td{background:#fdf5e6!important}
</style>
</head>
<body>
<div class="container">

<div id="listView">
  <div class="header">
    <h1>项目列表</h1>
    <button class="btn-add" id="addBtn">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      项目添加
    </button>
  </div>
  <div class="list" id="list"></div>
</div>

<div id="detailView" class="hidden">
  <div class="detail-header">
    <button class="btn-back" id="backBtn">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      返回
    </button>
    <h2 id="detailTitle"></h2>
  </div>
  <div class="detail-tabs">
    <button class="detail-tab active" data-view="upload">上传</button>
    <button class="detail-tab" data-view="codeversion">Code版本</button>
    <button class="detail-tab" data-view="docversion">算法文档</button>
  </div>

  <div id="uploadView">
    <div class="upload-section">
      <div class="section-header"><span class="section-label">算法文档（仅支持 .xlsx 格式）</span></div>
      <button class="upload-btn-doc" id="uploadDocBtn">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
        上传算法文档
      </button>
      <div class="upload-list" id="docList"></div>
      <div id="docEmpty" class="empty-docs">暂无文档</div>
      <div class="upload-footer" id="docFooter"></div>
    </div>

    <div class="upload-section">
      <div class="section-header"><span class="section-label">已上传的资源</span></div>
      <div style="display:flex;gap:16px">
        <div style="flex:1">
          <div class="sf-panel-section" style="border:1px solid #e4e7ed;border-radius:8px;overflow:hidden;display:flex;flex-direction:column">
            <div class="sf-panel-header">已上传的算法文档</div>
            <div class="sf-panel-body" id="sfDocList" style="max-height:250px"><div class="sf-empty">加载中...</div></div>
          </div>
        </div>
        <div style="flex:1">
          <div class="sf-panel-section" style="border:1px solid #e4e7ed;border-radius:8px;overflow:hidden;display:flex;flex-direction:column">
            <div class="sf-panel-header">已上传的Code版本</div>
            <div class="sf-panel-body" id="sfCodeVerList" style="max-height:250px"><div class="sf-empty">加载中...</div></div>
          </div>
        </div>
      </div>
      <div class="sf-selected-bar" id="sfSelectedBar"></div>
    </div>

    <div class="upload-section">
      <div class="section-header"><span class="section-label">项目代码</span></div>
        <button class="upload-btn-code" id="uploadCodeBtn">
            <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            上传代码
          </button>
          <div class="upload-list" id="codeList"></div>
          <div id="codeEmpty" class="empty-docs">暂无代码</div>
          <div class="upload-footer" id="codeFooter"></div>

          <!-- 解读区域 -->
          <div id="interpretArea" class="hidden" style="margin-top:12px">
            <div class="interpret-panel">
              <div class="interpret-header">代码解读</div>
              <div class="interpret-body">
                <div class="interpret-files" id="interpretFileList"></div>
                <div style="display:flex;gap:16px;flex:1">
            <div style="flex:1;display:flex;flex-direction:column">
              <div style="font-size:12px;font-weight:500;color:#606266;margin-bottom:6px;padding:0 4px">当前代码</div>
              <div class="interpret-content" id="interpretContent"></div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column" id="baseInterpretCol">
              <div style="font-size:12px;font-weight:500;color:#606266;margin-bottom:6px;padding:0 4px">Base版本</div>
              <div class="interpret-content" id="interpretBaseContent"></div>
            </div>
          </div>
            <div id="hexCompareSection" class="hidden" style="margin-top:16px;border-top:1px solid #ebeef5;padding-top:12px">
              <div style="font-size:13px;font-weight:500;color:#333;margin-bottom:10px">十六进制对比</div>
              <div id="hexCompareContent" style="overflow-x:auto"></div>
            </div>
              </div>
              <div class="interpret-footer" style="display:flex;align-items:center;gap:8px;justify-content:space-between">
              <div style="display:flex;align-items:center;gap:6px;flex:1;max-width:320px"><span style="font-size:12px;color:#909399;white-space:nowrap">Code用处</span><input id="codePurpose" style="flex:1;padding:6px 10px;border:1px solid #dcdfe6;border-radius:6px;font-size:12px;outline:none" placeholder="选填" /></div>
              <button class="btn-confirm" id="interpretConfirmBtn">
                  <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                  确认上传
                </button>
              </div>
            </div>
          </div>
    </div>
  </div>
  </div>

  <div id="codeversionView" class="hidden">
    <div class="table-controls">
      <button class="btn-refresh" id="refreshCodeBtn">

function isHex(str){return /^0x[0-9a-fA-F]+$/.test(str)}
function validateXlsxRow(row){const errs=[];const A=String(row[0]||"").trim(),B=String(row[1]||"").trim(),C=String(row[2]||"").trim(),D=String(row[3]||"").trim(),E=String(row[4]||"").trim(),F=String(row[5]||"").trim();function chk(v,l){if(!v)return true;const p=v.split(/\s+/);for(const x of p){if(!isHex(x)){errs.push(l+" 的值 \""+v+"\" 包含非十六进制值");return false}}return true}chk(B,"IP开关寄存器起始地址");chk(C,"IP开寄存器状态值");chk(D,"IP关寄存器状态值");chk(E,"IP参数起始地址");chk(F,"IP参数结束地址");if(B){const p=B.split(/\s+/);if(p.length>1)errs.push("IP开关寄存器起始地址只能填一个值，当前有 "+p.length+" 个")}if(C&&D){const c=C.split(/\s+/).length,d=D.split(/\s+/).length;if(c!==d)errs.push("IP开寄存器状态值的数量("+c+")与IP关寄存器状态值的数量("+d+")不相等")}if(C&&D&&C.split(/\s+/).join(" ")===D.split(/\s+/).join(" "))errs.push("IP开寄存器状态值与IP关寄存器状态值不能相同");if((E&&!F)||(!E&&F))errs.push("IP参数起始地址与IP参数结束地址必须同时为空或同时有值");if(E&&F&&parseInt(E,16)>=parseInt(F,16))errs.push("IP参数起始地址("+E+")必须小于IP参数结束地址("+F+")");return errs}
async function validateXlsxFile(file){const data=await file.arrayBuffer(),wb=XLSX.read(data,{type:"array"}),ws=wb.Sheets[wb.SheetNames[0]],json=XLSX.utils.sheet_to_json(ws,{header:1});const allErrs=[];for(let i=1;i<json.length;i++){const row=json[i];if(!row||!row[0])continue;for(const e of validateXlsxRow(row))allErrs.push("第"+(i+1)+"行: "+e)}return allErrs.length?{ok:false,errors:allErrs}:{ok:true}}

function crc16(d){let c=0xFFFF;for(let i=0;i<d.length;i++){c^=d[i];for(let j=0;j<8;j++){if(c&1)c=(c>>1)^0xA001;else c>>=1}}return c}
function renderHexCompare(container,baseData,curData,ipGroups){
const hx=v=>v>=0?v.toString(16).toUpperCase().padStart(2,"0"):"  ";
const ch=String.fromCharCode;
// Build byte classification map
const sw=new Set(),pm=new Set();
for(const g of ipGroups||[]){
const ra=parseInt(g.ra,16);
if(!isNaN(ra)&&g.on){
const onCnt=g.on.trim().split(/\s+/).filter(s=>s).length;
const offCnt=(g.off||"").trim().split(/\s+/).filter(s=>s).length;
const cnt=Math.max(onCnt,offCnt,1);
for(let i=0;i<cnt;i++)sw.add(ra+i)}
const ps=parseInt(g.ps,16),pe=parseInt(g.pe,16);
if(!isNaN(ps)&&!isNaN(pe)&&pe>=ps){
for(let i=ps;i<=pe;i++)pm.add(i)}}
function cellClass(offset,diff){
const isSw=sw.has(offset),isPm=pm.has(offset);
let c='';
if(isSw)c='cell-switch';
else if(isPm)c='cell-param';
if(diff)c+=' cell-diff';
return c?' class="'+c.trim()+'"':''}
const maxLen=Math.max(curData.length,baseData.length);
let h='<div style="overflow-x:auto"><table class="hex-table"><thead><tr><th rowspan="2" class="col-offset-header">Offset</th><th colspan="16" class="col-block-header">当前代码 (0-F)</th><th colspan="16" class="col-block-header-base">Base 版本 (0-F)</th></tr><tr>';
for(let i=0;i<16;i++){const c=i<10?ch(48+i):ch(65+i-10);h+='<th>'+c+'</th>'}
for(let i=0;i<16;i++){const c=i<10?ch(48+i):ch(65+i-10);h+='<th>'+c+'</th>'}
h+='</tr></thead><tbody>';
let totalRows=0,diffRows=0;
for(let a=0;a<maxLen;a+=16){
let hasDiff=false;
const diffs=[];
for(let c=0;c<16;c++){const o=a+c,cv=o<curData.length?curData[o]:-1,bv=o<baseData.length?baseData[o]:-1;diffs[c]=cv!==bv;if(diffs[c])hasDiff=true}
if(!hasDiff)continue;
totalRows++;diffRows++;
const aS=a.toString(16).toUpperCase().padStart(8,"0");
let row='<tr><td class="col-offset">'+aS+'</td>';
for(let c=0;c<16;c++){const o=a+c,cv=o<curData.length?curData[o]:-1;row+='<td'+cellClass(o,diffs[c])+'>'+(cv>=0?hx(cv):"  ")+'</td>'}
for(let c=0;c<16;c++){const o=a+c,bv=o<baseData.length?baseData[o]:-1;row+='<td'+cellClass(o,diffs[c])+'>'+(bv>=0?hx(bv):"  ")+'</td>'}
row+='</tr>';
h+=row+'\n'}
if(!totalRows){h+='<tr><td colspan="33" style="text-align:center;color:#bbb;padding:30px;font-family:sans-serif">全部相同，无差异行</td></tr>'}
h+='</tbody></table></div>';
h+='<div class="diff-summary"><span class="diff-count">差异行: <b>'+diffRows+'</b></span></div>';
container.innerHTML=h}
function _renderCombinedTable(container,ipGroups,curBins,baseBins,hasBase){
if(!ipGroups.length){container.innerHTML='<div style="color:#bbb;font-size:13px;text-align:center;padding:20px">No IP data</div>';return}
if(!curBins.length){container.innerHTML='<div style="color:#bbb;font-size:13px;text-align:center;padding:20px">No binary data</div>';return}
const E=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
function bld(v,i){return v>=0?'0x'+v.toString(16).toUpperCase().padStart(2,'0'):'NA'}
function swCnt(g){const onA=(g.on||'').trim().split(/\s+/).filter(s=>s);const offA=(g.off||'').trim().split(/\s+/).filter(s=>s);return Math.max(onA.length,offA.length,1)}
function rdBits(g,bins){const cnt=swCnt(g);const ra=parseInt(g.ra,16);if(isNaN(ra))return null;for(const b of bins){if(ra+cnt<=b.d.length){const vals=[];for(let i=0;i<cnt;i++)vals.push(bld(b.d[ra+i],i));return vals}}return null}
function calcCrc(g,bins){const ps=parseInt(g.ps,16),pe=parseInt(g.pe,16);if(isNaN(ps)||isNaN(pe)||pe<ps)return null;const len=pe-ps+1;for(const b of bins){if(ps+len<=b.d.length){const buf=new Uint8Array(len);buf.set(b.d.slice(ps,ps+len));return '0x'+crc16(buf).toString(16).toUpperCase().padStart(4,'0')}}return null}
function st(ra,bins,g){if(ra===null)return null;for(const b of bins){if(ra<b.d.length){const v=b.d[ra];const onA=(g.on||'').trim().split(/\s+/).filter(s=>s);const offA=(g.off||'').trim().split(/\s+/).filter(s=>s);if(onA.some(p=>parseInt(p,16)===v))return 'ON';if(offA.some(p=>parseInt(p,16)===v))return 'OFF'}return null}return null}
let h='<div style="overflow-x:auto;padding:4px 0"><table class="ip-table"><thead><tr><th colspan="6" class="section-header section-cur">CUR 代码</th><th class="col-divider"></th><th colspan="6" class="section-header section-base">Base 版本</th></tr><tr><th style="width:56px">IP名称</th><th style="width:42px">状态</th><th style="width:98px">参数地址</th><th style="width:62px">CRC</th><th style="width:108px">IP开关寄存器值</th><th style="width:80px">读取值</th><th class="col-divider"></th><th style="width:56px">IP名称</th><th style="width:42px">状态</th><th style="width:98px">参数地址</th><th style="width:62px">CRC</th><th style="width:108px">IP开关寄存器值</th><th style="width:80px">读取值</th></tr></thead><tbody>';
for(const g of ipGroups){
const ra=parseInt(g.ra,16);const raOk=!isNaN(ra)&&ra>=0;
const curSt=raOk?st(ra,curBins,g):null;
const baseSt=hasBase&&raOk?st(ra,baseBins,g):null;
const curCrc=calcCrc(g,curBins);
const baseCrc=hasBase?calcCrc(g,baseBins):null;
const curRead=rdBits(g,curBins);
const baseRead=hasBase?rdBits(g,baseBins):null;
const curStT=curSt||'?';const baseStT=hasBase?(baseSt||'?'):null;
const stDiff=hasBase&&curSt!==baseSt;
const crcDiff=hasBase&&curCrc!==baseCrc;
const readDiff=hasBase&&curRead!==null&&baseRead!==null&&curRead.join(' ')!==baseRead.join(' ');
const hasDiff=stDiff||crcDiff||readDiff;
const raStr=g.ra||'';const peStr=g.pe||'';
const addrStr=raStr&&peStr?raStr+'~'+peStr:(raStr||'');
const addrOk=addrStr?true:false;
const addrCls=addrStr?(raOk?'param-addr':'param-addr-na'):'';
h+='<tr'+(hasDiff?' class="diff-row"':'')+'>';
// CUR side
h+='<td class="'+(hasDiff?'ip-name-diff':'ip-name')+'">'+E(g.n)+'</td>';
// status
if(curStT==='ON')h+='<td><span class="status-badge status-on">ON</span></td>';
else if(curStT==='OFF')h+='<td><span class="status-badge status-off">OFF</span></td>';
else if(curSt===null)h+='<td><span class="status-badge status-na">NA</span></td>';
else h+='<td><span class="status-badge status-unk">?</span></td>';
// param addr
h+='<td'+(addrCls?' class="'+addrCls+'"':'')+'>'+E(addrStr||'-')+'</td>';
// crc
if(curCrc===null)h+='<td><span class="crc-val crc-na">NA</span></td>';
else h+='<td><span class="crc-val'+(crcDiff?' crc-diff':'')+'">'+E(curCrc)+'</span></td>';
// switch reg values
const onA=(g.on||'').trim().split(/\s+/).filter(s=>s);const offA=(g.off||'').trim().split(/\s+/).filter(s=>s);

function ipv(arr,skipIdx){const errs=[];for(let i=0;i<arr.length;i++){if(i===skipIdx)continue;const g=arr[i];if(!g.A&&!g.B&&!g.C&&!g.D&&!g.E&&!g.F)continue;const r=/^0x[0-9a-fA-F]+$/;var ck=function(v,l){if(!v)return;const p=v.split(/\s+/);for(const x of p){if(!r.test(x)){errs.push("第"+(i+1)+"行 "+l+": \""+v+"\" 非十六进制");return}}};ck(g.B,"IP开关寄存器起始地址");ck(g.C,"IP开寄存器状态值");ck(g.D,"IP关寄存器状态值");ck(g.E,"IP参数起始地址");ck(g.F,"IP参数结束地址");if(g.B&&g.B.split(/\s+/).length>1)errs.push("第"+(i+1)+"行 IP开关寄存器起始地址只能填一个值");if(g.C&&g.D){const c=g.C.split(/\s+/).length,d=g.D.split(/\s+/).length;if(c!==d)errs.push("第"+(i+1)+"行 开数量("+c+")与关数量("+d+")不相等")}if(g.C&&g.D&&g.C.split(/\s+/).join(" ")===g.D.split(/\s+/).join(" "))errs.push("第"+(i+1)+"行 IP开寄存器状态值与IP关寄存器状态值不能相同");if((g.E&&!g.F)||(!g.E&&g.F))errs.push("第"+(i+1)+"行 起始地址与结束地址必须同时为空或同时有值");if(g.E&&g.F&&parseInt(g.E,16)>=parseInt(g.F,16))errs.push("第"+(i+1)+"行 起始地址("+g.E+")必须小于结束地址("+g.F+")")}return errs}
async function saveIpGroups(){for(let i=0;i<ipGroups.length;i++){const g=ipGroups[i];if(editingIdx===i){g.A=document.getElementById("ipf_"+i+"_A").value;g.B=document.getElementById("ipf_"+i+"_B").value;g.C=document.getElementById("ipf_"+i+"_C").value;g.D=document.getElementById("ipf_"+i+"_D").value;g.E=document.getElementById("ipf_"+i+"_E").value;g.F=document.getElementById("ipf_"+i+"_F").value}}const errs=ipv(ipGroups,-1);if(errs.length){alert("保存校验失败：\n"+errs.join("\n"));return}const ov=document.getElementById("docversionContent");ov.innerHTML='<div class="saving-overlay">保存中...</div>';try{const p=L()[currentProjectIdx];const h=await getHandle(p.name);const sf=await h.getDirectoryHandle("sf");const fh=await sf.getFileHandle(docDetailName,{create:true});const hdr=["IP名称","IP开关寄存器起始地址","IP开寄存器状态值","IP关寄存器状态值","IP参数起始地址","IP参数结束地址"];const data=[hdr];for(const g of ipGroups)data.push([g.A,g.B,g.C,g.D,g.E,g.F]);const ws=XLSX.utils.aoa_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Sheet1");const wbOut=XLSX.write(wb,{type:"array",bookType:"xlsx"});const wr=await fh.createWritable();await wr.write(wbOut);await wr.close();editingIdx=-1;backDocList();loadSfDocs();alert("保存成功")}catch(e){alert("保存失败："+e.message);renderIpGroups()}}
/* === doc detail view === */
async function showDocDetail(name){const p=L()[currentProjectIdx];if(!p)return;const h=await getHandle(p.name);if(!h){alert("无法访问");return}try{const sf=await h.getDirectoryHandle("sf");const fh=await sf.getFileHandle(name);const f=await fh.getFile();const data=await f.arrayBuffer();const wb=XLSX.read(data,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];const json=XLSX.utils.sheet_to_json(ws,{header:1});ipGroups=[];editingIdx=-1;docDetailName=name;for(let r=1;r<json.length;r++){const row=json[r];if(!row||!row[0])continue;ipGroups.push({A:String(row[0]||"").trim(),B:String(row[1]||"").trim(),C:String(row[2]||"").trim(),D:String(row[3]||"").trim(),E:String(row[4]||"").trim(),F:String(row[5]||"").trim()})}renderIpGroups()}catch(e){document.getElementById("docversionContent").innerHTML='<div class="empty">读取失败：'+e.message+'</div>'}}

async function showCodeDetail(name, prevName){

try{
const cfg=await readCodeConfig(p.name);

html+='<span style="color:#e6a23c">Base版本:</span> '+E(entry.baseVersion||"首版");

html+='</div>';
const _allNames=new Set();
for(const _x of entry.interpretation||[])_allNames.add(_x.n);
for(const _x of entry.baseInterpretation||[])_allNames.add(_x.n);
if(_allNames.size){
const _dn=entry.linkedDoc||"";
html+='<div style="font-size:14px;font-weight:500;color:#333;margin:16px 0 8px">算法对比 (算法文档: '+E(_dn)+')</div>';
html+='<div style="overflow-x:auto"><table class="ip-table"><thead><tr><th colspan="6" class="section-header section-cur">CUR 代码</th><th class="col-divider"></th><th colspan="6" class="section-header section-base">Base 版本</th></tr><tr><th>IP名称</th><th>状态</th><th>参数地址</th><th>CRC</th><th>IP开关寄存器值</th><th>读取值</th><th class="col-divider"></th><th>IP名称</th><th>状态</th><th>参数地址</th><th>CRC</th><th>IP开关寄存器值</th><th>读取值</th></tr></thead><tbody>';
for(const _nm of _allNames){
const _cu=(entry.interpretation||[]).find(x=>x.n===_nm);
const _ba=(entry.baseInterpretation||[]).find(x=>x.n===_nm);
const hd=_cu&&_ba&&(_cu.st!==_ba.st||_cu.crc!==_ba.crc);
html+='<tr'+(hd?' class="diff-row"':'')+'>';
html+='<td class="'+(hd?'ip-name-diff':'ip-name')+'">'+E(_nm)+'</td>';
if(_cu){if(_cu.st==="ON")html+='<td><span class="status-badge status-on">ON</span></td>';else if(_cu.st==="OFF")html+='<td><span class="status-badge status-off">OFF</span></td>';else html+='<td><span class="status-badge status-unk">?</span></td>'}
else html+='<td><span class="status-badge status-na">NA</span></td>';
html+='<td class="param-addr">'+E(_cu&&_cu.addr?_cu.addr:'-')+'</td>';
html+='<td><span class="crc-val'+(hd&&_cu&&_ba&&_cu.crc!==_ba.crc?' crc-diff':'')+'">'+E(_cu?_cu.crc:'NA')+'</span></td>';
html+='<td><span class="switch-na">'+E(_cu&&_cu.sw?_cu.sw:'-')+'</span></td>';html+='<td><span class="read-na">'+E(_cu&&_cu.rd?_cu.rd:'-')+'</span></td>';
html+='<td class="col-divider"></td>';
html+='<td class="'+(hd?'ip-name-diff':'ip-name')+'">'+E(_nm)+'</td>';
if(_ba){if(_ba.st==="ON")html+='<td><span class="status-badge'+(hd&&_cu&&_cu.st!==_ba.st?' status-diff':' status-on')+'">ON</span></td>';else if(_ba.st==="OFF")html+='<td><span class="status-badge'+(hd&&_cu&&_cu.st!==_ba.st?' status-diff':' status-off')+'">OFF</span></td>';else html+='<td><span class="status-badge status-unk">?</span></td>'}
else html+='<td><span class="status-badge status-na">NA</span></td>';
html+='<td class="param-addr">'+E(_cu?_ba.addr?_ba.addr:'-':'')+'</td>';
html+='<td><span class="crc-val'+(hd&&_cu&&_ba&&_cu.crc!==_ba.crc?' crc-diff':'')+'">'+E(_ba?_ba.crc:'NA')+'</span></td>';
html+='<td><span class="switch-na">'+E(_cu?_ba.sw?_ba.sw:'-':'')+'</span></td>';html+='<td><span class="read-na">'+E(_cu?_ba.rd?_ba.rd:'-':'')+'</span></td>';
html+='</tr>'}
html+='</tbody></table></div>'}if(entry.hexCompare&&entry.hexCompare.trim()){
html+='<div style="font-size:14px;font-weight:500;color:#333;margin:16px 0 8px">十六进制对比</div>';
html+='<div style="border:1px solid #e4e7ed;border-radius:8px;overflow:hidden;background:#fff">'+entry.hexCompare+'</div>'}
ct.innerHTML=html
}catch(e){ct.innerHTML=html+'<div class="empty">读取失败: '+e.message+'</div>'}
}
